<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>My Orders</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h2 class="mb-4">My Orders</h2>

    <div th:if="${orders.size() > 0}">
        <div th:each="order : ${orders}" class="mb-5">
            <h5 class="fw-bold">Order #<span th:text="${order.id}"></span></h5>
            <p class="mb-1">
                On <span th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></span>,
                the user placed an order using <span th:text="${order.paymentMethod.name}"></span>.
            </p>

            <table class="table table-bordered mt-3">
                <thead class="table-info">
                <tr>
                    <th>Toy</th>
                    <th>Quantity</th>
                    <th>Price</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${order.cart.items}">
                    <td th:text="${item.toyName}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.toyPrice}"></td>
                </tr>
                </tbody>
            </table>

            <div class="text-end fw-bold">
                Order Total: <span th:text="${order.cart.totalPrice} + ' EUR'"></span>
            </div>
            <hr/>
        </div>
    </div>

    <div th:if="${orders.size() == 0}" class="alert alert-warning w-50">
        You have no past orders.
    </div>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/badge.js}"></script>

</body>
</html>
