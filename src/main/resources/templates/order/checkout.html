<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Checkout</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-5">
    <h2 class="mb-4">Checkout</h2>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark">
            <h5 class="mb-0 text-white">Shipping Information</h5>
        </div>
        <div class="card-body">
            <p><strong>Name:</strong> <span th:text="${user.name} + ' ' + ${user.surname}"></span></p>
            <p><strong>Address:</strong> <span th:text="${user.address} + ', ' + ${user.city} + ', ' + ${user.country}"></span></p>
            <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
        </div>
    </div>

    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark">
            <h5 class="mb-0 text-white">Order Summary</h5>
        </div>
        <div class="card-body">
            <table class="table mb-3">
                <thead>
                <tr>
                    <th>Toy</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cart.items}">
                    <td th:text="${item.toyName}"></td>
                    <td th:text="${item.toyPrice} + ' EUR'"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="${item.totalPrice} + ' EUR'"></td>
                </tr>
                </tbody>
            </table>
            <div class="text-end fs-5 fw-bold">
                Total: <span th:text="${cart.totalPrice} + ' EUR'"></span>
            </div>
        </div>
    </div>

    <form id="checkoutForm" th:action="@{/orders/checkout}" method="post">
        <div class="row g-2 align-items-end">
            <div class="col-md-4">
                <label for="paymentMethodId" class="form-label h5">Choose payment option:</label>
                <select class="form-select" name="paymentMethodId" id="paymentMethodId" required>
                    <option th:each="pm : ${paymentMethods}" th:value="${pm.id}" th:text="${pm.name}">Method</option>
                </select>
            </div>
            <div class="col-auto">
                <div class="form-label d-none d-md-block">&nbsp;</div>
                <button class="btn btn-success">Place Order</button>
            </div>
        </div>
    </form>
</div>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/badge.js}"></script>
<script th:src="@{/js/paypal.js}"></script>

</body>
</html>
