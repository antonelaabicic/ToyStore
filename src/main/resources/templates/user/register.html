<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - ToyStore</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container py-5">
    <div class="row justify-content-center py-5">
        <div class="col-md-8">
            <h2 class="mb-4 text-center">Register</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form method="post" th:action="@{/user/register}" th:object="${user}">
                <div class="row">

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="name">Name</label>
                            <input id="name" type="text" class="form-control" th:field="*{name}" />
                        </div>
                        <div class="mb-3">
                            <label for="surname">Surname</label>
                            <input id="surname" type="text" class="form-control" th:field="*{surname}" />
                        </div>
                        <div class="mb-3">
                            <label for="username">Username</label>
                            <input id="username" type="text" class="form-control" th:field="*{username}" required />
                        </div>
                        <div class="mb-3">
                            <label for="email">Email</label>
                            <input id="email" type="email" class="form-control" th:field="*{email}" />
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="country">Country</label>
                            <input id="country" type="text" class="form-control" th:field="*{country}" />
                        </div>
                        <div class="mb-3">
                            <label for="city">City</label>
                            <input id="city" type="text" class="form-control" th:field="*{city}" />
                        </div>
                        <div class="mb-3">
                            <label for="address">Address</label>
                            <input id="address" type="text" class="form-control" th:field="*{address}" />
                        </div>
                        <div class="mb-3">
                            <label for="password">Password</label>
                            <input id="password" type="password" class="form-control" th:field="*{password}" required />
                        </div>
                        <div class="mb-3">
                            <label for="confirm_password">Confirm Password</label>
                            <input id="confirm_password" type="password" class="form-control" th:field="*{confirmPassword}" required />
                        </div>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col text-end">
                        <button type="submit" class="btn btn-success">Register</button>
                    </div>
                </div>
            </form>

        </div>
    </div>
</div>


<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/badge.js}"></script>

</body>
</html>
